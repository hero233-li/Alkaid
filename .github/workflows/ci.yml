name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Alkaid-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: Alkaid-python/requirements-dev.lock
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.lock
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - run: python -m mypy
      - run: python scripts/check_architecture.py
      - run: python scripts/compile_product_config.py --check
      - run: python manage.py makemigrations --check --dry-run --settings=config.settings.test
      - run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Alkaid-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Alkaid-react/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
